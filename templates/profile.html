<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">
    <link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>
<body>

<div class="container mt-5">

    <h1>User Profile</h1>

    <br>

    <div class="card p-4 shadow">

        <h3>Email</h3>
        <p>{{ email }}</p>

        <h3>Total Reports Generated</h3>
        <p>{{ total_reports }}</p>

        <h3>Highest ATS Score</h3>
        <p>{{ highest_score }} %</p>

        <h3>Average ATS Score</h3>
        <p>{{ average_score }} %</p>

    </div>

    <br>

    <a href="/dashboard"
       class="btn btn-primary">

        Back to Dashboard

    </a>

</div>

</body>
</html>
